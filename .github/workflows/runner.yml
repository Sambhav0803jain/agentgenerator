name: "Agent creation"

on :
   push:
     branches: 
        - main

jobs:

  create-runner:
    runs-on: ubuntu-latest

    outputs:
      runner_name: ${{ steps.runner.outputs.runner_name }}
      token: ${{ steps.token.outputs.token }}

    steps:

      - name: Generate unique runner name
        id: runner
        run: |
          RUNNER_NAME=runner-${GITHUB_RUN_ID}
          echo "runner_name=$RUNNER_NAME" >> $GITHUB_OUTPUT

      - name: Get registration token (debug)
        id: token
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "Checking PAT length: ${#GH_PAT}"
      
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token)
      
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n1)
      
          echo "HTTP code: $CODE"
          echo "Response: $BODY"
      
          TOKEN=$(echo "$BODY" | jq -r .token)
      
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Start runner container
        run: |
          docker run -d \
            --name ${{ steps.runner.outputs.runner_name }} \
            --restart unless-stopped \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e GITHUB_URL=https://github.com/${{ github.repository }} \
            -e RUNNER_TOKEN=${{ steps.token.outputs.token }} \
            -e RUNNER_NAME=${{ steps.runner.outputs.runner_name }} \
            -e RUNNER_LABELS=dynamic,linux \
            ubuntu:stonking-20260612


      - name: Wait for registration
        run: |
          sleep 30

      - name: Verify runner
        run: |
          echo "Running on dynamic runner"
          hostname

      - name: Build
        run: |
          docker version

      - name: Register GitHub Runner
        run: |
            mkdir actions-runner
            cd actions-runner
            
            curl -o actions-runner.tar.gz -L https://github.com/actions/runner/releases/download/v2.328.0/actions-runner-linux-x64-2.328.0.tar.gz
            
            tar xzf actions-runner.tar.gz
         
              ./config.sh \
              --url https://github.com/${{ github.repository }} \
              --token ${{ steps.token.outputs.token }} \
              --name ${{ steps.runner.outputs.runner_name }} \
              --labels dynamic,linux\
              --unattended \
              --replace
            
              nohup ./run.sh > runner.log 2>&1 &

  build:

    needs: create-runner

    runs-on:
      - self-hosted
      - dynamic
      - linux

    steps:

      - uses: actions/checkout@v4

      - name: Verify runner
        run: |
          echo "Running on dynamic runner"
          hostname

      - name: Build
        run: |
          docker version   
